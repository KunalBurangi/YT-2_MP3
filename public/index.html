<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convert YouTube videos to MP3 with a beautiful, fast converter. Paste a link, choose quality, and download.">
  <title>YT → MP3 | YouTube to MP3 Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- Noise texture overlay -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <main class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 18V5l12-2v13" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="6" cy="18" r="3" fill="url(#logo-grad)"/>
            <circle cx="18" cy="16" r="3" fill="url(#logo-grad)"/>
            <defs>
              <linearGradient id="logo-grad" x1="3" y1="3" x2="21" y2="21">
                <stop stop-color="#a78bfa"/>
                <stop offset="1" stop-color="#f472b6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>YT <span class="accent">→</span> MP3</h1>
      </div>
      <p class="subtitle">Convert any YouTube video to high-quality MP3 in seconds</p>
    </header>

    <!-- Converter card -->
    <section class="converter-card" id="converterCard">
      <!-- URL Input -->
      <div class="input-group" id="inputGroup">
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <textarea
            id="urlInput"
            placeholder="Paste YouTube URL(s) here (one per line)..."
            autocomplete="off"
            spellcheck="false"
            rows="3"
          ></textarea>
          <button class="paste-btn" id="pasteBtn" title="Paste from clipboard" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <rect x="8" y="2" width="8" height="4" rx="1" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
        <button class="convert-btn" id="convertBtn" type="button">
          <span class="btn-text">Convert</span>
          <span class="btn-loader" hidden>
            <svg class="spinner" width="20" height="20" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="60 30" stroke-linecap="round"/>
            </svg>
          </span>
          <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Quality selector -->
      <div class="quality-selector" id="qualitySelector">
        <span class="quality-label">Quality</span>
        <div class="quality-options">
          <label class="quality-option">
            <input type="radio" name="quality" value="128">
            <span class="quality-chip">128 kbps</span>
          </label>
          <label class="quality-option">
            <input type="radio" name="quality" value="192" checked>
            <span class="quality-chip">192 kbps</span>
          </label>
          <label class="quality-option">
            <input type="radio" name="quality" value="320">
            <span class="quality-chip">320 kbps</span>
          </label>
        </div>
      </div>

      <!-- Queue Section -->
      <div class="queue-section" id="queueSection" hidden>
        <div class="queue-list" id="queueList"></div>
        
        <div class="queue-controls">
          <div class="global-progress">
            <div class="global-status-text">
              <span id="globalStatusMsg">Converting...</span>
              <span id="globalStatusRatio">0/0 Complete</span>
            </div>
            <div class="progress-track">
              <div class="progress-bar" id="globalProgressBar"></div>
              <div class="progress-glow" id="globalProgressGlow"></div>
            </div>
          </div>
          
          <div class="global-actions">
            <button class="download-all-btn" id="downloadAllBtn" type="button" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Download All (ZIP)
            </button>
            <button class="new-btn" id="clearQueueBtn" type="button">Convert More</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>For personal use only. Respect copyright laws.</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
